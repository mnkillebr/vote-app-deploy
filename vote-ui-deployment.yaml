apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-ui
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: vote-ui
  template:
    metadata:
      labels:
        app: vote-ui
    spec:
      containers:
      - image: docker.io/killebrew4dev/vote:2dfd74bd2b684c7492f4bb3a0b89894ddcaf033f
        name: vote-ui
        ports:
        - containerPort: 80